<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LM Dialog – Add Resources Prototype</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Fluent 2 design tokens ── */
    :root {
      --f-brand:         #0F6CBD;
      --f-brand-hover:   #115EA3;
      --f-brand-press:   #0E4775;
      --f-brand-tint:    #EBF3FC;

      --f-fg1:           #242424;
      --f-fg2:           #616161;
      --f-fg3:           #707070;
      --f-fg-dis:        #BDBDBD;

      --f-bg1:           #FFFFFF;
      --f-bg2:           #FAFAFA;
      --f-bg3:           #F5F5F5;
      --f-bg4:           #F0F0F0;

      --f-stroke1:       #D1D1D1;
      --f-stroke2:       #E0E0E0;
      --f-stroke3:       #F0F0F0;
      --f-stroke-hover:  #C7C7C7;

      --f-success-fg:    #107C10;
      --f-success-bg:    #DFF6DD;
      --f-danger-fg:     #BC2F32;
      --f-danger-bg:     #FDE7E9;

      --f-font: 'Segoe UI Variable Display', 'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif;
      --f-r-s: 2px;
      --f-r-m: 4px;
      --f-r-l: 8px;
      --f-shadow-dialog: 0px 32px 64px rgba(0,0,0,0.24), 0px 0px 8px rgba(0,0,0,0.02);
    }

    body {
      font-family: var(--f-font);
      font-size: 14px;
      line-height: 20px;
      color: var(--f-fg1);
      background: #E8EBEE;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 20px;
    }

    /* ── Dialog (Fluent 2 Dialog surface) ── */
    .dialog {
      background: var(--f-bg1);
      border-radius: var(--f-r-l);
      box-shadow: var(--f-shadow-dialog);
      width: min(1040px, 100%);
      height: min(82vh, 720px);
      position: relative;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Dialog header ── */
    .dialog-header {
      padding: 24px 24px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }
    .dialog-title {
      font-size: 20px;   /* subtitle1 */
      font-weight: 600;
      line-height: 28px;
      color: var(--f-fg1);
      white-space: nowrap;
    }

    /* ── Fluent 2 Combobox ── */
    .f-combobox { position: relative; min-width: 270px; }
    .f-combobox-input {
      display: flex;
      align-items: center;
      height: 32px;
      border: 1px solid var(--f-stroke1);
      border-bottom-color: var(--f-fg3);
      border-radius: var(--f-r-m);
      background: var(--f-bg1);
      cursor: pointer;
      padding: 0 2px 0 11px;
      gap: 2px;
      user-select: none;
    }
    .f-combobox-input:hover { border-color: var(--f-stroke-hover); border-bottom-color: var(--f-fg1); }
    .f-combobox-input.open  { border-color: var(--f-stroke1); border-bottom: 2px solid var(--f-brand); }
    .f-combobox-value {
      flex: 1;
      font-size: 14px;
      font-family: var(--f-font);
      color: var(--f-fg1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 20px;
    }
    .f-combobox-chevron {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      color: var(--f-fg2);
      flex-shrink: 0;
    }
    .f-combobox-listbox {
      position: absolute;
      top: calc(100% + 2px);
      right: 0;
      min-width: 100%;
      background: var(--f-bg1);
      border: 1px solid var(--f-stroke2);
      border-radius: var(--f-r-m);
      box-shadow: 0 8px 16px rgba(0,0,0,0.14);
      z-index: 100;
      overflow-y: auto;
      max-height: 280px;
      padding: 4px 0;
    }
    .f-combobox-option {
      display: flex; align-items: center; gap: 8px;
      padding: 0 12px;
      height: 32px;
      font-size: 14px;
      font-family: var(--f-font);
      color: var(--f-fg1);
      cursor: pointer;
      white-space: nowrap;
    }
    .f-combobox-option-label { flex: 1; }
    .f-combobox-option-check {
      display: flex; align-items: center; justify-content: center;
      width: 20px; flex-shrink: 0;
      color: var(--f-fg1);
    }
    .f-combobox-option:hover   { background: var(--f-bg3); }
    .f-combobox-option.selected { background: transparent; }
    .f-combobox-option.selected:hover { background: var(--f-bg3); }

    /* ── Fluent 2 Tooltip ── */
    #f-tooltip {
      position: fixed;
      background: #292929;
      color: #ffffff;
      border-radius: 4px;
      padding: 4px 11px;
      font-size: 12px;
      font-family: var(--f-font);
      line-height: 16px;
      pointer-events: none;
      z-index: 9999;
      box-shadow: 0 4px 8px rgba(0,0,0,0.14);
      white-space: nowrap;
      max-width: 240px;
      opacity: 0;
      transition: opacity 0.1s ease;
    }
    #f-tooltip.visible { opacity: 1; }
    #f-tooltip-arrow {
      position: absolute;
      width: 8px;
      height: 8px;
      background: #292929;
      border-radius: 2px;
      transform: rotate(45deg);
      /* default placement = below → arrow at top */
      top: -4px;
      left: 12px;
    }

    /* ── Section labels (Fluent 2 Subtitle 2) ── */
    .section-label {
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      color: var(--f-fg1);
      padding: 16px 0 10px;
      flex-shrink: 0;
    }

    /* ── Tables ── */
    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 1050px;
      table-layout: fixed;
    }
    th {
      font-size: 12px;
      font-weight: 600;
      line-height: 16px;
      color: var(--f-fg2);
      text-align: center;
      padding: 6px 4px;
      background: var(--f-bg2);
      white-space: nowrap;
    }
    th.col-label { text-align: left; width: 240px; padding-left: 0; }
    th.col-total  { width: 72px; }
    th.col-month  { width: 96px; }
    th.col-year {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-align: center;
      padding: 2px 4px;
      color: var(--f-fg2);
      background: var(--f-bg2);
      border-bottom: 1px solid var(--f-stroke2);
      white-space: nowrap;
      text-transform: uppercase;
    }
    .col-year-sep { border-right: 2px solid var(--f-stroke2); }

    td { padding: 2px 3px; vertical-align: middle; }
    td.col-label { padding-left: 0; font-size: 12px; line-height: 16px; color: var(--f-fg1); white-space: nowrap; }

    /* ── Hour tiles (availability) ── */
    .tile {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 28px;
      border-radius: var(--f-r-s);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      gap: 3px;
      white-space: nowrap;
    }
    .tile-green   { background: var(--f-success-bg); color: var(--f-success-fg); }
    .tile-red     { background: var(--f-danger-bg);  color: var(--f-danger-fg); font-weight: 600; }
    .tile-neutral { background: transparent;          color: var(--f-fg1); }
    .tile-rem-green { background: #B1F2AC; color: #000000; font-weight: 600; height: 26px; }
    .tile-rem-red   { background: #FF9D9F; color: #000000; font-weight: 600; height: 26px; }

    /* ── Allocation inputs (Fluent 2 Input, outline appearance) ── */
    .alloc-input {
      width: 100%;
      height: 28px;
      border: 1px solid transparent; /* invisible at rest */
      border-bottom-color: transparent;
      padding: 0 6px;
      font-size: 12px;
      font-family: var(--f-font);
      font-variant-numeric: tabular-nums;
      text-align: center;
      background: var(--f-bg1); /* white – no blue fill */
      outline: none;
      border-radius: var(--f-r-m); /* 4 px all corners */
      color: var(--f-fg1);
      transition: border-color 0.1s;
    }
    .alloc-input:hover  { border-color: var(--f-stroke-hover); border-bottom-color: var(--f-fg1); }
    .alloc-input:focus  { border-color: var(--f-stroke1); border-bottom: 2px solid var(--f-brand); }
    /* type="text" inputs have no native spinners — nothing to suppress */
    .alloc-total {
      font-size: 12px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      color: var(--f-fg1);
      font-weight: 600;
      line-height: 28px;
    }

    /* ── Demand rows ── */
    .row-proposed   td { border-bottom: 1px solid var(--f-stroke3); }
    .row-commitment td { border-bottom: 1px solid var(--f-stroke3); }
    /* Suppress the last commitment row's border-bottom so it doesn't stack with
       the demand-remaining-outer border-top and create a visually double/thick line */
    .demand-fixed-panel tbody tr:last-child td,
    #demandScroll       tbody tr:last-child td { border-bottom: none; }
    .row-remaining  td { border-top: 1px solid var(--f-stroke2); }

    /* ── dialogBody flex column ── */
    #dialogBody {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      padding: 0 24px;
    }

    /* ── Demand section ── */
    #demandSection { flex-shrink: 0; }

    /* ── Always-visible header strip (column titles) ── */
    .demand-header-outer { display: flex; flex-shrink: 0; }
    .demand-header-fixed {
      flex-shrink: 0; width: 312px; overflow: hidden;
      background: var(--f-bg2); border-right: 1px solid var(--f-stroke2);
    }
    .demand-header-fixed table { width: 312px; min-width: 312px; border-collapse: separate; border-spacing: 0; }
    .demand-header-fixed th { background: var(--f-bg2); }
    #demandHeaderScroll { flex: 1; overflow-x: hidden; }
    #demandHeaderScroll table { min-width: 1728px; border-collapse: separate; border-spacing: 0; }

    /* ── Always-visible Proposed strip ── */
    .demand-proposed-outer {
      display: flex; flex-shrink: 0;
      border-bottom: 1px solid var(--f-stroke3);
    }
    .demand-proposed-outer .row-proposed td { border-bottom: none; } /* suppress td border-bottom (container handles it) */
    .demand-proposed-fixed {
      flex-shrink: 0; width: 312px; overflow: hidden;
      background: var(--f-bg2); border-right: 1px solid var(--f-stroke2);
    }
    .demand-proposed-fixed table { width: 312px; min-width: 312px; border-collapse: separate; border-spacing: 0; }
    .demand-proposed-fixed td { background: var(--f-bg2); }
    #demandProposedScroll { flex: 1; overflow-x: hidden; }
    #demandProposedScroll table { min-width: 1728px; border-collapse: separate; border-spacing: 0; }

    /* Scroll box: non-flex wrapper — max-height + overflow-y here so the flex row inside can genuinely overflow */
    .demand-scroll-box {
      max-height: 120px;   /* 3 resources × 40 px — header and Proposed are now outside */
      overflow-y: scroll;  /* always-visible vertical scrollbar */
      overflow-x: hidden;  /* no horizontal scroll at this level — #demandScroll handles it */
      scrollbar-width: thin;
      scrollbar-color: var(--f-stroke1) var(--f-bg3);
    }
    .demand-scroll-box::-webkit-scrollbar { width: 4px; }
    .demand-scroll-box::-webkit-scrollbar-track { background: var(--f-bg3); }
    .demand-scroll-box::-webkit-scrollbar-thumb { background: var(--f-stroke1); border-radius: 2px; }
    .demand-scroll-box::-webkit-scrollbar-thumb:hover { background: var(--f-fg2); }

    /* Remaining row: permanently visible strip pinned below the scroll box */
    .demand-remaining-outer {
      display: flex;
      flex-shrink: 0;
      border-top: 1px solid var(--f-stroke3); /* matches row dividers */
    }
    /* Prevent the general .row-remaining td border-top from doubling the divider */
    .demand-remaining-outer .row-remaining td { border-top: none; }
    .demand-remaining-fixed {
      flex-shrink: 0;
      width: 312px;
      overflow: hidden;
      background: var(--f-bg2);
      border-right: 1px solid var(--f-stroke2);
    }
    .demand-remaining-fixed table {
      width: 312px;
      min-width: 312px;
      border-collapse: separate;
      border-spacing: 0;
    }
    .demand-remaining-fixed td { background: var(--f-bg2); }
    #demandRemainingScroll {
      flex: 1;
      overflow-x: hidden; /* position driven by #demandScroll via JS scroll-sync */
    }
    #demandRemainingScroll table {
      min-width: 1728px;
      border-collapse: separate;
      border-spacing: 0;
    }

    /* Flex row: pure layout — no height constraints, so its natural height can overflow .demand-scroll-box */
    .demand-outer {
      display: flex;
    }

    /* Fixed left panel: label + Total columns, no scroll */
    .demand-fixed-panel {
      flex-shrink: 0;
      width: 312px; /* 240 label + 72 total */
      overflow: hidden;
      background: var(--f-bg2);
      border-right: 1px solid var(--f-stroke2);
    }
    .demand-fixed-panel table {
      width: 312px;
      min-width: 312px;
      border-collapse: separate;
      border-spacing: 0;
    }
    .demand-fixed-panel td,
    .demand-fixed-panel th { background: var(--f-bg2); }

    /* Scrollable right panel: month columns — no scrollbar here, driven by #demandHScroll below */
    #demandScroll {
      flex: 1;
      overflow-x: hidden;
    }
    #demandScroll table {
      min-width: 1728px; /* 18 × 96px */
      border-collapse: separate;
      border-spacing: 0;
    }

    /* Scrollbar strip: sits below the Remaining row, aligned to month columns only */
    .demand-hscroll-outer {
      display: flex;
      flex-shrink: 0;
    }
    .demand-hscroll-spacer {
      flex-shrink: 0;
      width: 312px; /* matches fixed panel width */
      border-right: 1px solid var(--f-stroke2);
      background: var(--f-bg2);
    }
    #demandHScroll {
      flex: 1;
      height: 8px;
      overflow-x: scroll;
      scrollbar-width: thin;
      scrollbar-color: var(--f-stroke1) var(--f-bg3);
    }
    #demandHScroll::-webkit-scrollbar { height: 4px; }
    #demandHScroll::-webkit-scrollbar-track { background: var(--f-bg3); }
    #demandHScroll::-webkit-scrollbar-thumb { background: var(--f-stroke1); border-radius: 2px; }
    #demandHScroll::-webkit-scrollbar-thumb:hover { background: var(--f-fg2); }
    .demand-hscroll-inner {
      height: 8px;
      min-width: 1728px;
    }

    /* ── Resources section – fills remaining height ── */
    #resourcesSection {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Resource body scroll – vertical only, no horizontal scrollbar ── */
    .resources-scroll-wrap {
      flex: 1;
      min-height: 40px;
      overflow-y: scroll;  /* always-visible vertical scrollbar */
      overflow-x: hidden;  /* no H scrollbar here — dedicated strip below handles it */
      scrollbar-width: thin;
      scrollbar-color: var(--f-stroke1) var(--f-bg3);
    }
    .resources-scroll-wrap::-webkit-scrollbar { width: 4px; }
    .resources-scroll-wrap::-webkit-scrollbar-track { background: var(--f-bg3); }
    .resources-scroll-wrap::-webkit-scrollbar-thumb { background: var(--f-stroke1); border-radius: 2px; }
    .resources-scroll-wrap::-webkit-scrollbar-thumb:hover { background: var(--f-fg2); }

    /* Two-panel layout: fixed left (312 px) + scrollable months — mirrors demand section */
    .resources-outer { display: flex; }
    .resources-fixed-panel {
      flex-shrink: 0;
      width: 312px;
      overflow: hidden;
      background: var(--f-bg1);
      border-right: 1px solid var(--f-stroke2);
    }
    .resources-fixed-panel table {
      width: 312px;
      min-width: 312px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Month panel: overflow-x:hidden — scrollLeft driven by #resourcesHScroll via JS */
    #resourcesScroll {
      flex: 1;
      overflow-x: hidden;
    }
    #resourcesScroll table {
      min-width: 1728px;
      border-collapse: collapse;
      table-layout: fixed;
    }

    /* Resources horizontal scrollbar strip: aligned to month columns only */
    .resources-hscroll-outer {
      display: flex;
      flex-shrink: 0;
    }
    .resources-hscroll-spacer {
      flex-shrink: 0;
      width: 312px;
      border-right: 1px solid var(--f-stroke2);
    }
    #resourcesHScroll {
      flex: 1;
      height: 8px;
      overflow-x: scroll;
      scrollbar-width: thin;
      scrollbar-color: var(--f-stroke1) var(--f-bg3);
    }
    #resourcesHScroll::-webkit-scrollbar { height: 4px; }
    #resourcesHScroll::-webkit-scrollbar-track { background: var(--f-bg3); }
    #resourcesHScroll::-webkit-scrollbar-thumb { background: var(--f-stroke1); border-radius: 2px; }
    #resourcesHScroll::-webkit-scrollbar-thumb:hover { background: var(--f-fg2); }
    .resources-hscroll-inner {
      height: 8px;
      min-width: 1728px;
    }

    /* Resource month cells: vertical padding creates row gaps; tile fills remaining height */
    #resourcesScrollTable td { padding: 4px 0; }
    #resourcesScrollTable .tile { border-radius: 0; }
    #resourcesScrollTable .tile-green { background: #B1F2AC; color: #000000; }
    #resourcesScrollTable .tile-red   { background: #FF9D9F; color: #000000; }

    /* ── Resource list rows ── */
    .res-row { cursor: pointer; }
    .res-row td { transition: background 0.07s; border-bottom: 1px solid var(--f-stroke3); }

    /* Fixed panel hover/selected: set on td so they override any default cell background */
    .resources-fixed-panel .res-row:not(.selected):hover td,
    .resources-fixed-panel .res-row.hovered:not(.selected) td { background: var(--f-bg3); }
    .resources-fixed-panel .res-row.selected td { background: var(--f-brand-tint); }
    .resources-fixed-panel .res-row.selected:hover td,
    .resources-fixed-panel .res-row.selected.hovered td { background: #DDEAF8; }

    /* Scroll panel hover/selected: set on tr (tiles are divs inside td, so tr bg shows in cell padding) */
    #resourcesScroll .res-row:not(.selected):hover,
    #resourcesScroll .res-row.hovered:not(.selected) { background: var(--f-bg3); }
    #resourcesScroll .res-row.selected { background: var(--f-brand-tint); }
    #resourcesScroll .res-row.selected:hover,
    #resourcesScroll .res-row.selected.hovered { background: #DDEAF8; }

    /* ── Fluent 2 Checkbox ── */
    .res-check {
      width: 16px; height: 16px;
      cursor: pointer;
      accent-color: var(--f-brand);
      flex-shrink: 0;
    }
    td.col-check { width: 36px; padding-left: 10px; }

    .res-name { font-weight: 600; font-size: 14px; line-height: 20px; color: var(--f-fg1); }
    .res-role  { font-size: 12px; line-height: 16px; color: var(--f-fg2); margin-top: 1px; }

    /* ── Section divider (removed between sections, kept only inside tables) ── */
    .scroll-indicator { display: none; }

    /* ── Navigation bar ── */
    .nav-bar {
      display: flex;
      align-items: center;
      padding: 10px 16px 4px;
      flex-shrink: 0;
      min-height: 40px;
    }
    /* Fluent 2 subtle icon button */
    .nav-arrow {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      background: none;
      border: none;
      border-radius: var(--f-r-m);
      cursor: pointer;
      color: var(--f-brand);
      padding: 0;
    }
    .nav-arrow:hover:not(:disabled)  { background: var(--f-bg4); }
    .nav-arrow:active:not(:disabled) { background: var(--f-stroke2); }
    .nav-arrow:disabled { color: var(--f-fg-dis); cursor: not-allowed; }
    .nav-arrow svg { display: block; pointer-events: none; }

    /* Fluent 2 subtle text button – previous (left side) */
    .nav-prev {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 14px;
      font-family: var(--f-font);
      color: var(--f-brand);
      padding: 0 8px;
      border-radius: var(--f-r-m);
    }
    .nav-prev:hover:not(:disabled)  { color: var(--f-brand-hover); text-decoration: underline; background: none; }
    .nav-prev:active:not(:disabled) { color: var(--f-brand-press); text-decoration: underline; background: none; }
    .nav-prev:disabled { color: var(--f-fg-dis); cursor: not-allowed; text-decoration: none; }
    .nav-prev svg { flex-shrink: 0; pointer-events: none; }

    /* Fluent 2 subtle text button – next (right side) */
    .nav-next {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 32px;
      background: none;
      border: none;
      border-radius: var(--f-r-m);
      cursor: pointer;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      font-family: var(--f-font);
      color: var(--f-brand);
      padding: 0 8px;
    }
    .nav-next:hover:not(:disabled)  { color: var(--f-brand-hover); text-decoration: underline; background: none; }
    .nav-next:active:not(:disabled) { color: var(--f-brand-press); text-decoration: underline; background: none; }
    .nav-next:disabled { color: var(--f-fg-dis); cursor: not-allowed; text-decoration: none; }
    .nav-next svg { flex-shrink: 0; pointer-events: none; }

    /* ── Action bar (Fluent 2 Dialog footer) ── */
    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px 26px; /* 12px top + 14px extra bottom */
      flex-shrink: 0;
    }
    .status-text {
      margin-left: auto;
      font-size: 12px;
      line-height: 16px;
      color: var(--f-fg2);
      white-space: nowrap;
    }

    /* ── Fluent 2 Primary button ── */
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      height: 32px;
      padding: 0 20px;
      background: var(--f-brand);
      color: #FFFFFF;
      border: 1px solid var(--f-brand);
      border-radius: var(--f-r-m);
      font-size: 14px;
      font-weight: 600;
      line-height: 20px;
      font-family: var(--f-font);
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary:hover:not(:disabled)  { background: var(--f-brand-hover); border-color: var(--f-brand-hover); }

// ══════════════════════════════════════════════════════════════════

// ══════════════════════════════════════════════════════════════════

// Per generic request: { selected: Set<id>, allocations: { id: [m0..m17] }, locked: { id: Set<monthIdx> } }
const staged = GENERIC_REQUESTS.map(() => ({ selected: new Set(), allocations: {}, locked: {} }));
let currentIdx = 0;

// ══════════════════════════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════════════════════════

const fmt      = n => parseFloat(n.toFixed(2)).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const truncate = (str, max) => str.length > max ? str.slice(0, max).trimEnd() + '...' : str;
const stage    = () => staged[currentIdx];
const request = () => GENERIC_REQUESTS[currentIdx];

/** Remaining demand per month for current generic request */
function remainingMonthly() {
  const s = stage(); const req = request();
  return MONTHS.map((_, mi) => {
    const used = [...s.selected].reduce((sum, rid) => sum + (s.allocations[rid]?.[mi] ?? 0), 0);
    return req.monthly[mi] - used;
  });
}

/** Remaining resource capacity per month (capacity – current allocation in this dialog) */
function resourceRemaining(rid) {
  const res = RESOURCES.find(r => r.id === rid);
  const alloc = stage().allocations[rid] ?? Array(MONTHS.length).fill(0);
  return MONTHS.map((_, mi) => res.capacity[mi] - alloc[mi]);
}

/** Total staged selections across all generic requests */
function totalStagedCount() {
  return staged.reduce((sum, s) => sum + s.selected.size, 0);
}

// ══════════════════════════════════════════════════════════════════
//  LOGIC
// ══════════════════════════════════════════════════════════════════

/**
 * Distribute proposed hours for generic request `si` equally across all selected
 * resources, month by month, respecting any manually-locked cells.
 *
 * For each month:
 *   remaining = proposed[m] - sum(locked allocations for that month)
 *   free resources (non-locked for that month) each receive: remaining / freeCount
 */
function autoDistribute(si) {
  const s   = staged[si];
  const req = GENERIC_REQUESTS[si];
  const rids = [...s.selected];
  const n = rids.length;
  if (n === 0) return;

  for (let m = 0; m < MONTHS.length; m++) {
    const proposed = req.monthly[m];

    // Tally up locked allocations for this month
    let lockedSum = 0, lockedCount = 0;
    for (const rid of rids) {
      if (s.locked[rid]?.has(m)) {
        lockedSum += s.allocations[rid]?.[m] ?? 0;
        lockedCount++;
      }
    }

    const freeCount = n - lockedCount;
    const remaining = proposed - lockedSum;
    // Round to 2 dp to avoid floating-point noise in inputs
    const perFree = freeCount > 0
      ? Math.round((Math.max(0, remaining) / freeCount) * 100) / 100
      : 0;

    for (const rid of rids) {
      if (!s.locked[rid]?.has(m)) {
        if (!s.allocations[rid]) s.allocations[rid] = Array(MONTHS.length).fill(0);
        s.allocations[rid][m] = perFree;
      }
    }
  }
}

function toggleResource(rid) {
  const s = stage();
  if (s.selected.has(rid)) {
    // Deselect: remove resource and clear its locks, then re-share freed hours equally
    s.selected.delete(rid);
    delete s.allocations[rid];
    delete s.locked[rid];
    autoDistribute(currentIdx);
  } else {
    s.selected.add(rid);
    s.allocations[rid] = Array(MONTHS.length).fill(0);
    // If no manual override has happened yet (no locks exist), redistribute evenly
    // among all selected resources. Once any lock exists (after a manual edit),
    // autoDistribute will respect locked values and only assign the remaining gap
    // to the new resource.
    const hasAnyLock = Object.values(s.locked).some(ls => ls.size > 0);
    if (!hasAnyLock) {
      autoDistribute(currentIdx);
    } else {
      // Post-override: give new resource only the genuinely remaining hours
      const req = GENERIC_REQUESTS[currentIdx];
      s.allocations[rid] = req.monthly.map((proposed, m) => {
        let currentTotal = 0;
        for (const existingRid of s.selected) {
          if (existingRid !== rid) currentTotal += s.allocations[existingRid]?.[m] ?? 0;
        }
        return Math.max(0, proposed - currentTotal);
      });
    }
  }
  render();
}

function updateAllocation(rid, mi, value) {
  const s = stage();
  if (!s.allocations[rid]) s.allocations[rid] = Array(12).fill(0);
  const parsed = parseFloat(value);
  s.allocations[rid][mi] = isNaN(parsed) || parsed < 0 ? 0 : parsed;

  // Freeze ALL currently selected resources at their current values across ALL months.
  // This means any resource added after a manual edit only fills the remaining gap —
  // existing resources (even those that were auto-distributed, not hand-edited) stay untouched.
  for (const selectedRid of s.selected) {
    if (!s.locked[selectedRid]) s.locked[selectedRid] = new Set();
    for (let m = 0; m < MONTHS.length; m++) s.locked[selectedRid].add(m);
  }

  // Do NOT redistribute to other resources — the difference goes to/from Remaining.
  renderDemandTable();
  renderResourcesTables();
  renderNavBar();
  renderActionBar();
  if (typeof syncScrollPositions === 'function') syncScrollPositions();
}

    const sel = i === currentIdx;
    return `<div class="f-combobox-option${sel ? ' selected' : ''}" onclick="selectOption(${i})">
      <span class="f-combobox-option-label">${r.label} – ${fmt(r.hours)}h</span>
      <span class="f-combobox-option-check">${sel ? checkSvg : ''}</span>
    </div>`;
  }).join('');
}

function toggleCombobox(e) {
  e.stopPropagation();
  const listbox = document.getElementById('comboboxListbox');
  const input   = document.getElementById('comboboxInput');
  const isOpen  = listbox.style.display !== 'none';
  listbox.style.display = isOpen ? 'none' : 'block';
  input.classList.toggle('open', !isOpen);
}

function closeCombobox() {
  document.getElementById('comboboxListbox').style.display = 'none';
  document.getElementById('comboboxInput').classList.remove('open');
}

function selectOption(idx) {
  currentIdx = idx;
  closeCombobox();
  render();
}

// ══════════════════════════════════════════════════════════════════
//  RENDER – Demand Table
// ══════════════════════════════════════════════════════════════════

function renderDemandTable() {
  const req = request(); const s = stage();
  const rem = remainingMonthly();
  const remTotal = rem.reduce((a,b)=>a+b,0);
  const remClass = remTotal > 0 ? 'tile-rem-red' : 'tile-rem-green';
  const RH = 40; // shared row height keeps both panels in sync

  const fixedCols  = `<colgroup><col style="width:240px"><col style="width:72px"></colgroup>`;
  const scrollCols = `<colgroup>${MONTHS.map(() => `<col style="width:96px">`).join('')}</colgroup>`;

  // Precompute year boundary column indices (last month of each non-final year span)
  const yearBounds = new Set();
  { let cumul = 0; for (let s = 0; s < YEAR_SPANS.length - 1; s++) { cumul += YEAR_SPANS[s].count; yearBounds.add(cumul - 1); } }

  // ── Header strip (always visible) ───────────────────────────────
  // Two-row header: year grouping (top) + month names (bottom)
  const YEAR_ROW_H  = 22;
  const MONTH_ROW_H = RH - YEAR_ROW_H; // 40 - 22 = 18px

  document.getElementById('demandHeaderFixed').innerHTML = `
    ${fixedCols}
    <thead>
      <tr style="height:${YEAR_ROW_H}px">
        <th class="col-label" style="padding:0 0 0 8px;font-size:11px;font-weight:700;letter-spacing:0.04em;color:var(--f-fg2);text-transform:uppercase;white-space:nowrap;"></th>
        <th class="col-total" style="padding:0;"></th>
      </tr>
      <tr style="height:${MONTH_ROW_H}px">
        <th class="col-label" style="padding-left:8px;"></th>
        <th class="col-total">Total</th>
      </tr>
    </thead>`;

  document.getElementById('demandHeaderScrollTable').innerHTML = `
    ${scrollCols}
    <thead>
      <tr style="height:${YEAR_ROW_H}px">
        ${YEAR_SPANS.map((span, i) => {
          const sep = i < YEAR_SPANS.length - 1 ? 'border-right:2px solid var(--f-stroke2);' : '';
          return `<th class="col-year" colspan="${span.count}" style="${sep}">${span.year}</th>`;
        }).join('')}
      </tr>
      <tr style="height:${MONTH_ROW_H}px">
        ${(() => {
          // Precompute which column indices are year boundaries (last col of each non-final year)
          const yearBounds = new Set();
          let cumul = 0;
          for (let s = 0; s < YEAR_SPANS.length - 1; s++) {
            cumul += YEAR_SPANS[s].count;
            yearBounds.add(cumul - 1);
          }
          return MONTHS.map((m, i) => {
            const sep = yearBounds.has(i) ? 'border-right:2px solid var(--f-stroke2);' : '';
            return `<th class="col-month" style="${sep}">${m}</th>`;
          }).join('');
        })()}
      </tr>
    </thead>`;

  // ── Proposed strip (always visible) ─────────────────────────────
  document.getElementById('demandProposedFixed').innerHTML = `
    ${fixedCols}
    <tbody><tr class="row-proposed" style="height:${RH}px">
      <td class="col-label" style="padding:6px 0 6px 8px;font-weight:600;color:#1b1b1b;">Proposed</td>
      <td><div class="tile tile-neutral" style="font-weight:600;">${fmt(req.hours)}</div></td>
    </tr></tbody>`;

  document.getElementById('demandProposedScrollTable').innerHTML = `
    ${scrollCols}
    <tbody><tr class="row-proposed" style="height:${RH}px">
      ${req.monthly.map((h, i) => {
        const sep = yearBounds.has(i) ? 'border-right:2px solid var(--f-stroke2);' : '';
        return `<td style="${sep}"><div class="tile tile-neutral">${fmt(h)}</div></td>`;
      }).join('')}
    </tr></tbody>`;

  // ── Resource rows (scrollable — only these scroll vertically) ───
  let fixedRows = '';
  let scrollRows = '';

  s.selected.forEach(rid => {
    const res = RESOURCES.find(r => r.id === rid);
    const alloc = s.allocations[rid] ?? Array(12).fill(0);
    const total = alloc.reduce((a,b)=>a+b,0);
    const fullLabel    = `(${res.role}) ${res.name}`;
    const displayLabel = truncate(fullLabel, 34);
    fixedRows += `
      <tr class="row-commitment" style="height:${RH}px">
        <td class="col-label" style="padding:4px 0 4px 8px;color:#424242;" data-tooltip="${fullLabel}" onmouseenter="showTooltip(this)" onmouseleave="hideTooltip()">${displayLabel}</td>
        <td><div class="alloc-total">${fmt(total)}</div></td>
      </tr>`;
    scrollRows += `
      <tr class="row-commitment" style="height:${RH}px">
        ${alloc.map((h, mi) => {
          const sep = yearBounds.has(mi) ? 'border-right:2px solid var(--f-stroke2);' : '';
          return `<td style="${sep}"><input class="alloc-input" type="text" inputmode="decimal" value="${fmt(h)}"
            onfocus="this.select()"
            onchange="updateAllocation('${rid}',${mi},this.value)"></td>`;
        }).join('')}
      </tr>`;
  });

  document.getElementById('demandFixedTable').innerHTML =
    `${fixedCols}<tbody>${fixedRows}</tbody>`;
  document.getElementById('demandScrollTable').innerHTML =
    `${scrollCols}<tbody>${scrollRows}</tbody>`;

  // ── Remaining strip (always visible) ────────────────────────────
  document.getElementById('demandRemainingFixed').innerHTML = `
    ${fixedCols}
    <tbody><tr class="row-remaining" style="height:${RH}px">
      <td class="col-label" style="padding:6px 0 6px 8px;font-weight:600;color:#1b1b1b;">Remaining</td>
      <td><div class="tile ${remClass}">${fmt(remTotal)}</div></td>
    </tr></tbody>`;

  document.getElementById('demandRemainingScrollTable').innerHTML = `
    ${scrollCols}
    <tbody><tr class="row-remaining" style="height:${RH}px">
      ${rem.map((h, i) => {
        const sep = yearBounds.has(i) ? 'border-right:2px solid var(--f-stroke2);' : '';
        return `<td style="text-align:center;font-size:12px;font-variant-numeric:tabular-nums;color:var(--f-fg2);padding:4px 3px;${sep}">${fmt(h)}</td>`;
      }).join('')}
    </tr></tbody>`;
}

// ══════════════════════════════════════════════════════════════════
//  RENDER – Resources Table
// ══════════════════════════════════════════════════════════════════

function renderResourcesTables() {
  const s = stage();
  const RRH = 56; // fixed row height keeps both panels in sync (name + role = ~53 px natural)

  const fixedColgroup = `<col style="width:36px"><col style="width:204px"><col style="width:72px">`;
  const scrollColgroup = MONTHS.map(() => `<col style="width:96px">`).join('');

  // Year boundary column indices for visual separator
  const resYearBounds = new Set();
  { let cumul = 0; for (let s = 0; s < YEAR_SPANS.length - 1; s++) { cumul += YEAR_SPANS[s].count; resYearBounds.add(cumul - 1); } }

  let fixedRows = '';
  let scrollRows = '';

  const allowedRoles = new Set(request().roles);
  const filteredResources = RESOURCES.filter(r => allowedRoles.has(r.role));

  filteredResources.forEach((res, i) => {
    const isSel = s.selected.has(res.id);
    const rem   = resourceRemaining(res.id);
    const total = rem.reduce((a, b) => a + b, 0);
    const totalColor = total < 0 ? '#a80000' : '#1b1b1b';
    const selClass   = isSel ? 'selected' : '';

    const tiles = rem.map((h, mi) => {
      const baseCap = res.capacity[mi];
      const isRed   = (baseCap <= 0) || (h < 0);
      const cls     = isRed ? 'tile-red' : 'tile-green';
      // Spacer approach: [14px invisible spacer][number][14px icon]
      // The invisible spacer mirrors the icon width so the number stays truly centered.
      const tileContent = isRed
        ? `<span style="width:14px;flex-shrink:0;visibility:hidden;" aria-hidden="true"></span>${fmt(h)}<span style="display:inline-flex;flex-shrink:0;align-items:center;pointer-events:none;"><svg width="14" height="14" viewBox="0 0 20 20" fill="#780000" xmlns="http://www.w3.org/2000/svg"><path d="M8.681 3.26a1.5 1.5 0 012.638 0l6.5 11.5c.59 1.05-.15 2.24-1.319 2.24h-13c-1.17 0-1.91-1.19-1.319-2.24l6.5-11.5zM10 4.236 3.773 15.5h12.454L10 4.236zM10 8a.75.75 0 01.75.75v3.5a.75.75 0 01-1.5 0v-3.5A.75.75 0 0110 8zm.75 6.5a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"/></svg></span>`
        : fmt(h);
      const sepStyle = resYearBounds.has(mi) ? 'border-right:2px solid var(--f-stroke2);' : '';
      return `<td style="padding:4px 0;${sepStyle}"><div class="tile ${cls}" style="height:${RRH - 9}px;border-radius:0;">${tileContent}</div></td>`;
    }).join('');

    fixedRows += `
      <tr class="res-row ${selClass}" data-row-idx="${i}" style="height:${RRH}px" onclick="toggleResource('${res.id}')">
        <td class="col-check">
          <input class="res-check" type="checkbox" ${isSel ? 'checked' : ''}
            onclick="event.stopPropagation(); toggleResource('${res.id}')">
        </td>
        <td style="padding:8px 4px 8px 0;">
          <div class="res-name">${res.name}</div>
          <div class="res-role">${res.role}</div>
        </td>
        <td style="text-align:center;font-size:12px;font-variant-numeric:tabular-nums;font-weight:600;color:${totalColor};">
          ${fmt(total)}
        </td>
      </tr>`;

    scrollRows += `
      <tr class="res-row ${selClass}" data-row-idx="${i}" style="height:${RRH}px" onclick="toggleResource('${res.id}')">
        ${tiles}
      </tr>`;
  });

  document.getElementById('resourcesFixedTable').innerHTML =
    `<colgroup>${fixedColgroup}</colgroup><tbody>${fixedRows}</tbody>`;
  document.getElementById('resourcesScrollTable').innerHTML =
    `<colgroup>${scrollColgroup}</colgroup><tbody>${scrollRows}</tbody>`;

  addResourceHoverSync();
}

/** Sync hover highlight across fixed + scroll panels using data-row-idx */
function addResourceHoverSync() {
  document.querySelectorAll('.res-row').forEach(row => {
    row.addEventListener('mouseenter', () => {
      const idx = row.dataset.rowIdx;
      document.querySelectorAll(`.res-row[data-row-idx="${idx}"]`)
        .forEach(r => r.classList.add('hovered'));
    });
    row.addEventListener('mouseleave', () => {
      const idx = row.dataset.rowIdx;
      document.querySelectorAll(`.res-row[data-row-idx="${idx}"]`)
        .forEach(r => r.classList.remove('hovered'));
    });
  });
}

function renderNavBar() {
  const prev = document.getElementById('prevLink');
  const next = document.getElementById('nextBtn');
  const ctr  = document.getElementById('navCounter');

  const isFirst = currentIdx === 0;
  const isLast  = currentIdx === GENERIC_REQUESTS.length - 1;

  prev.disabled = isFirst;
  prev.style.visibility = 'visible';
  prev.querySelector('.nav-label').style.visibility = isFirst ? 'hidden' : 'visible';

  next.disabled = isLast;
  next.style.visibility = 'visible';
  next.querySelector('.nav-label').style.visibility = isLast ? 'hidden' : 'visible';

  ctr.textContent = `(${currentIdx + 1} of ${GENERIC_REQUESTS.length})`;
}

function renderActionBar() {
  const totalNamed    = staged.reduce((sum, s) => sum + s.selected.size, 0);
  const genericsUsed  = staged.filter(s => s.selected.size > 0).length;
  document.getElementById('statusText').textContent =
    `${totalNamed} named selected on ${genericsUsed} of ${GENERIC_REQUESTS.length} generic resources`;
  document.getElementById('commitBtn').disabled = totalStagedCount() === 0;
}

function openModal() {
  const tbody = document.getElementById('modalTable');
  let html = '';
  let hasAny = false;

  staged.forEach((s, gi) => {
    const req = GENERIC_REQUESTS[gi];
    s.selected.forEach(rid => {
      const res = RESOURCES.find(r => r.id === rid);
      const alloc = s.allocations[rid] ?? [];
      const total = alloc.reduce((a,b)=>a+b,0);
      hasAny = true;
      html += `
        <tr>
          <td>
            <div style="font-weight:500;">(${res.role}) ${res.name}</div>
            <div style="font-size:11px;color:#616161;margin-top:2px;">${req.label}</div>
          </td>
          <td style="text-align:right;font-variant-numeric:tabular-nums;font-weight:600;white-space:nowrap;padding-left:16px;">${fmt(total)}h</td>
        </tr>`;
    });
  });

  if (!hasAny) {
    html = `<tr><td colspan="2" style="color:#616161;">No hours staged.</td></tr>`;
  }

  tbody.innerHTML = html;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modalOverlay').style.display = 'none';
}

function confirmCommit() {
  closeModal();
  // Feedback is given externally by the system — just close the dialog
  document.getElementById('dialog').style.display = 'none';
}

function cancelDialog() {
  if (totalStagedCount() === 0 || confirm('Discard all staged changes and close?')) {
    location.reload();
  }
}

// Horizontal scroll sync across all month panels.
// User-driven sources: #demandHScroll and #resourcesHScroll (the two scrollbar strips).
// Passive targets:     #demandScroll, #demandRemainingScroll, #resourcesScroll
//   — these have overflow-x:hidden and are scrolled programmatically via scrollLeft.
// Uses requestAnimationFrame to reset the busy flag AFTER queued scroll events fire,
// preventing infinite loops when setting scrollLeft triggers another scroll event.
(function() {
  const hScroll       = document.getElementById('demandHScroll');
  const headerPanel   = document.getElementById('demandHeaderScroll');
  const proposedPanel = document.getElementById('demandProposedScroll');
  const mainPanel     = document.getElementById('demandScroll');
  const remPanel      = document.getElementById('demandRemainingScroll');
  const resPanel      = document.getElementById('resourcesScroll');
  const resHScroll    = document.getElementById('resourcesHScroll');
  const all = [hScroll, headerPanel, proposedPanel, mainPanel, remPanel, resPanel, resHScroll];

  let busy = false;

  function sync(src) {
    if (busy) return;
    busy = true;
    const maxSrc = src.scrollWidth - src.clientWidth;
    const ratio  = maxSrc > 0 ? src.scrollLeft / maxSrc : 0;
    all.forEach(el => {
      if (el === src) return;
      const maxEl = el.scrollWidth - el.clientWidth;
      el.scrollLeft = ratio * maxEl;
    });
    requestAnimationFrame(() => { busy = false; });
  }

  hScroll.addEventListener('scroll',    () => sync(hScroll));
  resHScroll.addEventListener('scroll', () => sync(resHScroll));

  // Expose so render() can re-apply scroll position after rebuilding the DOM.
  // Deferred by one rAF so the browser lays out new table content before we read scrollWidth.
  window.syncScrollPositions = () => requestAnimationFrame(() => sync(hScroll));

  // Forward horizontal trackpad/wheel gestures from content areas to the scroll drivers.
  // Content panels have overflow-x:hidden so swipes are silently swallowed without this.
  function forwardWheel(el, driver) {
    el.addEventListener('wheel', e => {
      if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 0.5) {
        e.preventDefault();
        driver.scrollLeft += e.deltaX;
      }
    }, { passive: false });
  }
  [headerPanel, proposedPanel, mainPanel, remPanel,
   document.getElementById('demandSection')].forEach(el => forwardWheel(el, hScroll));
  [resPanel, document.getElementById('resourcesSection')].forEach(el => forwardWheel(el, resHScroll));
})();

document.addEventListener('click', closeCombobox);

//  FLUENT 2 TOOLTIP
// ══════════════════════════════════════════════════════════════════

let _tooltipTimer = null;
const TIP_ARROW_H = 8;   // size of the rotated square caret
const TIP_GAP     = 6;   // gap between target edge and caret tip

function showTooltip(el) {
  clearTimeout(_tooltipTimer);
  _tooltipTimer = setTimeout(() => {
    const tip   = document.getElementById('f-tooltip');
    const arrow = document.getElementById('f-tooltip-arrow');
    const text  = el.getAttribute('data-tooltip');
    if (!text) return;

    document.getElementById('f-tooltip-text').textContent = text;

    // Measure tooltip off-screen
    tip.style.left = '-9999px'; tip.style.top = '-9999px';
    tip.style.opacity = '0';
    tip.classList.add('visible');
    const tipW = tip.offsetWidth;
    const tipH = tip.offsetHeight;

    const rect = el.getBoundingClientRect();

    // Prefer below; flip above if clipped
    const spaceBelow = window.innerHeight - rect.bottom - TIP_GAP - tipH - 8;
    let placement = spaceBelow >= 0 ? 'below' : 'above';

    let top = placement === 'below'
      ? rect.bottom + TIP_GAP
      : rect.top - tipH - TIP_GAP;

    // Start-align with element, clamp to viewport
    let left = rect.left;
    if (left + tipW > window.innerWidth - 8) left = window.innerWidth - tipW - 8;
    if (left < 8) left = 8;

    // Arrow: centre it on the target element
    const targetCX = rect.left + rect.width / 2;
    let arrowLeft = targetCX - left - TIP_ARROW_H / 2;
    arrowLeft = Math.max(8, Math.min(tipW - TIP_ARROW_H - 8, arrowLeft));

    arrow.style.left   = arrowLeft + 'px';
    if (placement === 'below') {
      arrow.style.top    = (-TIP_ARROW_H / 2) + 'px';
      arrow.style.bottom = 'auto';
    } else {
      arrow.style.bottom = (-TIP_ARROW_H / 2) + 'px';
      arrow.style.top    = 'auto';
    }

    tip.style.left = left + 'px';
    tip.style.top  = top  + 'px';
    tip.style.opacity = '1';
  }, 300);
}

function hideTooltip() {
  clearTimeout(_tooltipTimer);
  const tip = document.getElementById('f-tooltip');
  tip.classList.remove('visible');
  tip.style.opacity = '0';
}
